apiVersion: v1
kind: Pod
metadata:
  name: pod-with-config
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    env:
    - name: APP_ENV
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_ENV
    - name: APP_VERSION
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_VERSION
