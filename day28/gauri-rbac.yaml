# Role — defines what actions are allowed
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: dev
rules:
- apiGroups: [""]              # "" = core API group (pods, services, secrets)
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]  # read-only — no create/delete/update
---
# RoleBinding — connects Role to gauri in dev namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gauri-pod-reader
  namespace: dev
subjects:
- kind: User
  name: gauri                  # matches CN in gauri's certificate
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
