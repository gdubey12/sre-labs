apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: project2
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      tolerations:
      - key: "tier"
        operator: "Equal"
        value: "backend"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: tier
                operator: In
                values:
                 - backend
      containers:
      - name: busybee
        image: busybox
        command: ["sh", "-c", "while true; do echo backend running; sleep 10; done"]
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: my-secret
        volumeMounts:
        - name: storage
          mountPath: /data
      volumes:
      - name: storage
        persistentVolumeClaim:
         claimName: pvc0
