---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv0
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/sre-data/pv0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc0
  namespace: project2
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
