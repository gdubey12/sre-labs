services:

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    restart: unless-stopped

  api:
    build: ./api
    container_name: sre-api
    restart: unless-stopped
    environment:
      - PORT=5000
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: sre-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

