apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  clusterIP: None        # This is what makes it headless
  selector:
    app: web
  ports:
    - port: 80
      name: web
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
spec:
  serviceName: web        # Must match the headless Service name
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          volumeMounts:
            - name: data      # Must match volumeClaimTemplates name below
              mountPath: /usr/share/nginx/html
  volumeClaimTemplates:   # One PVC per pod, auto-created
    - metadata:
        name: data          # PVC name = data-web-0, data-web-1
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 256Mi
