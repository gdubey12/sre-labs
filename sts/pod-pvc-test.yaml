apiVersion: v1
kind: Pod
metadata:
  name: pvc-test
spec:
  containers:
    - name: writer
      image: busybox
      command: ["sh", "-c", "echo 'SRE was here' > /data/test.txt && sleep 3600"]
      volumeMounts:
        - name: storage
          mountPath: /data
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: pvc0
