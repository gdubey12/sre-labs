# prod-pods.yaml
apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: prod
  labels:
    role: web
spec:
  containers:
  - name: app
    image: nginx:alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: app
  namespace: prod
  labels:
    role: app
spec:
  containers:
  - name: app
    image: nginx:alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: prod
  labels:
    role: db
spec:
  containers:
  - name: app
    image: postgres:15-alpine
    env:
    - name: POSTGRES_PASSWORD
      value: test
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: prod
spec:
  selector:
    role: app
  ports:
  - port: 8080
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: db-svc
  namespace: prod
spec:
  selector:
    role: db
  ports:
  - port: 5432
