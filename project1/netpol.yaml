apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: guestbook
spec:
  podSelector: {}           # applies to ALL pods in namespace
  policyTypes:
    - Ingress               # block all incoming traffic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: guestbook
spec:
  podSelector:
    matchLabels:
      app: backend          # this policy protects backend pods
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend # only allow traffic from frontend pods
      ports:
        - port: 8080        # only on this port
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-frontend
  namespace: guestbook
spec:
  podSelector:
    matchLabels:
      app: frontend         # protects frontend pods
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80          # allow anyone to reach port 80
