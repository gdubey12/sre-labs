apiVersion: v1
kind: PersistentVolume
metadata:
  name: project1-pv1
spec:
  capacity:
    storage: 256Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/sre-data/project1/pv1
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: project1-pv2
spec:
  capacity:
    storage: 256Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/sre-data/project1/pv2
