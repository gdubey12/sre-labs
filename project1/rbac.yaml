apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: guestbook
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: guestbook
rules:
  - apiGroups: [""]         # "" means core API group (pods, configmaps, secrets)
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rb
  namespace: guestbook
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: guestbook
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
