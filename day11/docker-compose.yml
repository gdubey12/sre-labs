services:
  postgres:
    image: postgres:15-alpine
    container_name: day11-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: srelab
      POSTGRES_USER: sreuser
      POSTGRES_PASSWORD: srepass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sreuser -d srelab"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: day11-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build: ./app
    container_name: day11-api
    restart: unless-stopped
    environment:
      - PORT=5000
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=srelab
      - POSTGRES_USER=sreuser
      - POSTGRES_PASSWORD=srepass
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: day11-nginx
    restart: unless-stopped
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
